# Shipped default when no rep_counter.toml is found on disk (cwd / parents).
# Copy rep_counter.toml to your working directory or set FLEXIBLE_REP_COUNTER_CONFIG.

[vm]
direct_url = "http://127.0.0.1:8000"

[rep]
peak_margin = 18
valley_margin = 16
hysteresis = 8
calibration_reps = 3
min_interval_ms = 300

[angle_selection.joints.LEFT_ELBOW]
min_variance = 4
min_range_deg = 10

[angle_selection.joints.RIGHT_ELBOW]
min_variance = 4
min_range_deg = 10

[angle_selection.joints.LEFT_KNEE]
min_variance = 6
min_range_deg = 15

[angle_selection.joints.RIGHT_KNEE]
min_variance = 6
min_range_deg = 15

[angle_selection.joints.LEFT_HIP]
min_variance = 6
min_range_deg = 15

[angle_selection.joints.RIGHT_HIP]
min_variance = 6
min_range_deg = 15
